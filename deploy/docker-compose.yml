services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s"]
      interval: 5s
      timeout: 10s
      retries: 30
    ports:
      - "127.0.0.1:9200:9200"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "127.0.0.1:5000:5000"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 5s
      timeout: 10s
      retries: 60
    ports:
      - "127.0.0.1:5601:5601"

  kibana-setup:
    image: curlimages/curl:8.7.1
    depends_on:
      kibana:
        condition: service_healthy
    volumes:
      - ./kibana/setup.sh:/setup.sh:ro
      - ./kibana/saved-objects.ndjson:/saved-objects.ndjson:ro
    entrypoint: ["sh", "/setup.sh"]
    restart: "no"

volumes:
  es-data:
